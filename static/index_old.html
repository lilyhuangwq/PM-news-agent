<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI News Briefing</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100">
  <div class="min-h-screen">
    <header class="bg-slate-900/95 border-b border-slate-800 py-8 shadow-xl shadow-slate-950/20 backdrop-blur-xl">
      <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
        <div class="flex flex-col gap-4 lg:flex-row lg:items-end lg:justify-between">
          <div>
            <p class="text-sm uppercase tracking-[0.3em] text-slate-500">AI News Briefing</p>
            <h1 class="mt-3 text-4xl font-semibold tracking-tight text-white">Daily AI insights for founders</h1>
          </div>
          <div class="grid gap-3 sm:grid-cols-2">
            <div class="rounded-3xl bg-slate-950/80 border border-slate-800 p-5 shadow-lg shadow-slate-950/30">
              <p class="text-xs uppercase tracking-[0.3em] text-slate-500">Today</p>
              <p id="todayDate" class="mt-3 text-xl font-semibold text-white">Loading...</p>
            </div>
            <div class="rounded-3xl bg-slate-950/80 border border-slate-800 p-5 shadow-lg shadow-slate-950/30">
              <p class="text-xs uppercase tracking-[0.3em] text-slate-500">Last updated</p>
              <p id="lastUpdated" class="mt-3 text-xl font-semibold text-white">Loading...</p>
            </div>
          </div>
          <div class="mt-6 flex justify-center">
            <button id="refreshBtn" class="rounded-3xl bg-sky-600 px-6 py-3 text-white font-semibold shadow-lg shadow-sky-600/30 transition hover:bg-sky-500 focus:outline-none focus:ring-2 focus:ring-sky-500 focus:ring-offset-2 focus:ring-offset-slate-950">
              Refresh News
            </button>
          </div>
        </div>
      </div>
    </header>

    <main class="mx-auto max-w-7xl px-4 py-10 sm:px-6 lg:px-8">
      <div class="grid gap-6 xl:grid-cols-[300px_1fr]">
        <aside class="rounded-3xl border border-slate-800 bg-slate-900/90 p-6 shadow-2xl shadow-slate-950/20">
          <div class="mb-6">
            <p class="text-sm uppercase tracking-[0.3em] text-slate-500">Archive</p>
            <h2 class="mt-3 text-2xl font-semibold text-white">Available dates</h2>
            <p class="mt-2 text-sm text-slate-400">Choose a historical date to review saved news.</p>
          </div>
          <div class="hidden md:block">
            <div id="dateList" class="space-y-3 max-h-[520px] overflow-y-auto pr-2"></div>
          </div>
          <div class="md:hidden">
            <label class="block text-sm font-medium text-slate-300">Select date</label>
            <select id="dateSelect" class="mt-3 w-full rounded-3xl border border-slate-700 bg-slate-950 px-4 py-3 text-slate-100 outline-none transition focus:border-sky-500">
              <option>Loading dates...</option>
            </select>
          </div>
        </aside>

        <section>
          <div class="mb-8 flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
            <div>
              <p class="text-sm uppercase tracking-[0.3em] text-slate-500">Live dashboard</p>
              <h2 class="mt-3 text-3xl font-semibold text-white">News by section</h2>
            </div>
            <div class="rounded-3xl bg-slate-900/90 border border-slate-800 px-5 py-4 text-right shadow-lg shadow-slate-950/20">
              <p class="text-xs uppercase tracking-[0.3em] text-slate-500">Viewing</p>
              <p id="activeDate" class="mt-2 text-xl font-semibold text-white">Today</p>
            </div>
          </div>

          <div class="grid gap-6 lg:grid-cols-2">
            <section-card section="AI & Tech Frontier" emoji="🚀" color="from-red-500 via-red-600 to-red-700"></section-card>
            <section-card section="Product & Builder" emoji="🛠️" color="from-blue-500 via-blue-600 to-blue-700"></section-card>
            <section-card section="Startup & VC" emoji="💼" color="from-orange-500 via-orange-600 to-orange-700"></section-card>
            <section-card section="Global Tech" emoji="🌍" color="from-emerald-500 via-emerald-600 to-emerald-700"></section-card>
            <section-card section="Deep Read" emoji="📖" color="from-violet-500 via-violet-600 to-violet-700"></section-card>
          </div>
        </section>
      </div>
    </main>
  </div>

  <template id="section-card-template">
    <article class="overflow-hidden rounded-3xl border border-slate-800 bg-slate-950 shadow-2xl shadow-slate-950/30">
      <div class="bg-gradient-to-r p-6 text-white" style="background-image: linear-gradient(to right, var(--tw-gradient-stops));">
        <p class="text-sm uppercase tracking-[0.3em] text-slate-200">Section</p>
        <h3 class="mt-4 text-2xl font-semibold"><span class="section-emoji"></span> <span class="section-title"></span></h3>
      </div>
      <div class="news-list space-y-4 p-6"></div>
    </article>
  </template>

  <script>
    const sections = [
      { title: "AI & Tech Frontier", emoji: "🚀", color: "from-red-500 via-red-600 to-red-700" },
      { title: "Product & Builder", emoji: "🛠️", color: "from-blue-500 via-blue-600 to-blue-700" },
      { title: "Startup & VC", emoji: "💼", color: "from-orange-500 via-orange-600 to-orange-700" },
      { title: "Global Tech", emoji: "🌍", color: "from-emerald-500 via-emerald-600 to-emerald-700" },
      { title: "Deep Read", emoji: "📖", color: "from-violet-500 via-violet-600 to-violet-700" },
    ];

    const sectionCards = {};
    const dateList = document.getElementById("dateList");
    const dateSelect = document.getElementById("dateSelect");
    const activeDate = document.getElementById("activeDate");
    const todayDate = document.getElementById("todayDate");
    const lastUpdated = document.getElementById("lastUpdated");
    const template = document.getElementById("section-card-template");
    const todayKey = new Date().toISOString().split("T")[0];

    function renderSections() {
      sections.forEach(({ title, emoji, color }) => {
        const clone = template.content.cloneNode(true);
        const header = clone.querySelector("div");
        clone.querySelector(".section-emoji").textContent = emoji;
        clone.querySelector(".section-title").textContent = title;
        header.className = `bg-gradient-to-r p-6 text-white ${color}`;
        const list = clone.querySelector(".news-list");
        list.innerHTML = `<p class="rounded-3xl bg-slate-900 px-4 py-6 text-slate-400">Loading ${title}...</p>`;
        document.querySelector("main > .grid > section > .grid").appendChild(clone);
        sectionCards[title] = list;
      });
    }

    function highlightDateItem(button, dateValue) {
      if (dateValue === todayKey) {
        button.className = "block rounded-3xl bg-slate-800 px-4 py-3 text-slate-100 ring-1 ring-sky-500 transition";
      } else {
        button.className = "block rounded-3xl bg-slate-900 px-4 py-3 text-slate-300 transition hover:bg-slate-800";
      }
    }

    async function loadDates() {
      try {
        const response = await fetch("/api/dates");
        const dates = await response.json();
        if (!Array.isArray(dates) || !dates.length) {
          dateList.innerHTML = `<p class="rounded-3xl bg-slate-900 px-4 py-6 text-slate-400">No archive dates found.</p>`;
          dateSelect.innerHTML = `<option>No dates found</option>`;
          return;
        }

        dateList.innerHTML = "";
        dateSelect.innerHTML = "";

        dates.forEach((dateValue) => {
          const button = document.createElement("button");
          button.type = "button";
          button.textContent = dateValue;
          button.addEventListener("click", () => selectDate(dateValue));
          highlightDateItem(button, dateValue);
          dateList.appendChild(button);

          const option = document.createElement("option");
          option.value = dateValue;
          option.textContent = dateValue === todayKey ? `${dateValue} (today)` : dateValue;
          dateSelect.appendChild(option);
        });

        dateSelect.value = todayKey;
        dateSelect.addEventListener("change", () => selectDate(dateSelect.value));
      } catch (error) {
        dateList.innerHTML = `<p class="rounded-3xl bg-rose-900 px-4 py-6 text-rose-300">Failed to load archive dates.</p>`;
        dateSelect.innerHTML = `<option>Error loading dates</option>`;
      }
    }

    function updateActiveDateLabel(dateValue) {
      activeDate.textContent = dateValue === todayKey ? "Today" : dateValue;
    }

    function resetSectionLoading() {
      sections.forEach(({ title }) => {
        sectionCards[title].innerHTML = `<p class="rounded-3xl bg-slate-900 px-4 py-6 text-slate-400">Loading ${title}...</p>`;
      });
    }

    async function loadNews(dateValue = todayKey) {
      resetSectionLoading();
      updateActiveDateLabel(dateValue);
      lastUpdated.textContent = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });

      const endpoint = dateValue === todayKey ? "/api/news/today" : `/api/news/${dateValue}`;
      try {
        const response = await fetch(endpoint);
        const data = await response.json();
        sections.forEach(({ title }) => {
          const items = data[title] || [];
          if (!items.length) {
            sectionCards[title].innerHTML = `<p class="rounded-3xl bg-slate-900 px-4 py-6 text-slate-400">No news for this section.</p>`;
            return;
          }
          sectionCards[title].innerHTML = items.slice(0, 5).map((item) => `
            <article class="rounded-3xl border border-slate-800 bg-slate-950 p-5 transition hover:border-slate-700 hover:bg-slate-900">
              <a href="${item.url}" target="_blank" rel="noopener noreferrer" class="text-lg font-bold text-slate-100 hover:text-sky-400">${item.title}</a>
              <p class="mt-2 text-slate-300 text-sm"><strong>What:</strong> ${item.what}</p>
              <p class="mt-1 text-slate-300 text-sm"><strong>So what:</strong> ${item.so_what}</p>
              <p class="mt-3 text-xs text-slate-500">🔗 ${item.source} | ⏱ 2 min read</p>
            </article>
          `).join("");
        });
      } catch (error) {
        sections.forEach(({ title }) => {
          sectionCards[title].innerHTML = `<p class="rounded-3xl bg-rose-900 px-4 py-6 text-rose-300">Unable to load news for ${title}.</p>`;
        });
      }
    }

    function selectDate(dateValue) {
      loadNews(dateValue);
      dateSelect.value = dateValue;
      document.querySelectorAll("#dateList button").forEach((button) => highlightDateItem(button, button.textContent));
    }

    const now = new Date();
    todayDate.textContent = now.toLocaleDateString("en-US", { weekday: "long", year: "numeric", month: "long", day: "numeric" });
    lastUpdated.textContent = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });

    renderSections();
    loadDates().then(() => loadNews(todayKey));

    document.getElementById("refreshBtn").addEventListener("click", async () => {
      const btn = document.getElementById("refreshBtn");
      btn.disabled = true;
      btn.textContent = "Refreshing...";
      try {
        const response = await fetch("/api/refresh", { method: "POST" });
        if (!response.ok) throw new Error("Refresh failed");
        await loadNews(todayKey);
      } catch (error) {
        alert("Failed to refresh news. Please try again.");
      } finally {
        btn.disabled = false;
        btn.textContent = "Refresh News";
      }
    });
  </script>
</body>
</html>
